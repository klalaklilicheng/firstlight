name: Update Market Data

on:
  schedule:
    - cron: '0 * * * *'     # Every hour
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fetch-data.mjs
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update market data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
      - name: Check Actions quota
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USAGE=$(gh api /repos/${{ github.repository }}/actions/cache/usage 2>/dev/null || echo "{}")
          # Count runs this billing cycle (approximate: count runs in last 30 days)
          RUN_COUNT=$(gh run list --limit 1000 --json createdAt --jq '[.[] | select(.createdAt > (now - 2592000 | todate))] | length' 2>/dev/null || echo "0")
          # Each run ≈ 1 min. Free quota = 2000 min. Warn at 667 min (1/3).
          echo "Runs this cycle: ~$RUN_COUNT (≈${RUN_COUNT} minutes used of 2000)"
          if [ "$RUN_COUNT" -ge 667 ] 2>/dev/null; then
            # Check if warning issue already exists
            EXISTING=$(gh issue list --label "quota-warning" --state open --json number --jq 'length')
            if [ "$EXISTING" = "0" ]; then
              gh issue create \
                --title "⚠️ GitHub Actions 额度已用 ${RUN_COUNT}/2000 分钟（超过 1/3）" \
                --body "当前计费周期已运行约 **${RUN_COUNT} 次**（≈${RUN_COUNT} 分钟），已超过免费额度 2000 分钟的 1/3。

          请考虑：
          - 降低更新频率（如改为每 2 小时）
          - 拆分价格/新闻为不同频率

          _此 Issue 由 workflow 自动创建，每个计费周期只提醒一次。_" \
                --label "quota-warning"
              echo "⚠️ Quota warning issue created!"
            else
              echo "Warning issue already exists, skipping."
            fi
          else
            echo "✅ Quota OK."
          fi
