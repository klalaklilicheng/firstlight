<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day1 Briefing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a; color: #e0e0e0; padding: 20px; max-width: 1200px; margin: 0 auto;
    line-height: 1.5;
  }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 32px; flex-wrap: wrap; gap: 8px; }
  header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  header .time { font-size: 13px; color: #666; }
  h2 { font-size: 15px; font-weight: 500; color: #888; margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
  section { margin-bottom: 40px; }

  /* Price cards */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .card { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 14px; transition: border-color 0.2s; }
  .card:hover { border-color: #333; }
  .card .symbol { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .card .price { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .card .change { font-size: 13px; font-weight: 500; }
  .up { color: #22c55e; }
  .down { color: #ef4444; }
  .flat { color: #666; }
  .error { opacity: 0.4; }

  /* BTC Cycle */
  .btc-box { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 20px; }
  .btc-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .btc-score-big { font-size: 48px; font-weight: 700; }
  .btc-meta { font-size: 14px; color: #999; }
  .btc-meta .level { font-weight: 600; }
  .btc-suggestion { font-size: 13px; color: #888; margin-bottom: 16px; padding: 8px 12px; background: #1a1a1a; border-radius: 6px; }
  .btc-indicators { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px; }
  .btc-ind { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
  .btc-ind .ind-name { color: #999; }
  .btc-ind .ind-bar { flex: 1; margin: 0 10px; height: 4px; background: #222; border-radius: 2px; position: relative; }
  .btc-ind .ind-fill { height: 100%; border-radius: 2px; }
  .btc-ind .ind-score { color: #ccc; font-weight: 500; min-width: 24px; text-align: right; }
  .score-low { color: #22c55e; }
  .score-mid { color: #f59e0b; }
  .score-high { color: #ef4444; }

  /* Earnings */
  .earnings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .earn-card { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 14px; }
  .earn-card .sym { font-size: 15px; font-weight: 600; color: #fff; }
  .earn-card .sym a { color: #fff; }
  .earn-card .comment { font-size: 12px; color: #94a3b8; margin: 4px 0 2px; }
  .earn-card .next-date { font-size: 12px; color: #f59e0b; margin: 2px 0 8px; }
  .earn-card .next-date .est { color: #666; font-style: italic; }
  .earn-card .quarters { font-size: 12px; color: #999; }
  .earn-card .q-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1a1a1a; }
  .earn-card .q-row a { color: #999; }
  .earn-card .q-row a:hover { color: #58a6ff; }
  .beat { color: #22c55e; }
  .miss { color: #ef4444; }

  /* Mando Minutes */
  .mando-box { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 20px; }
  .mando-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .mando-header .title a { font-size: 16px; font-weight: 600; color: #fff; }
  .mando-header .date { font-size: 12px; color: #666; }
  .mando-sections { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
  .mando-section { }
  .mando-section .sec-header { font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .mando-section .sec-item { font-size: 13px; color: #bbb; padding: 3px 0; border-bottom: 1px solid #1a1a1a; line-height: 1.4; }

  /* IPO watch */
  .ipo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .ipo-card { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 14px; }
  .ipo-card .name { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .ipo-card .no-news { font-size: 12px; color: #444; }
  .ipo-card .ipo-news-item { font-size: 13px; color: #ccc; margin-bottom: 4px; }
  .ipo-card .ipo-news-item .date { color: #666; font-size: 11px; }

  /* FOMC */
  .fomc-box { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 20px; }
  .fomc-next { font-size: 18px; font-weight: 600; color: #f59e0b; margin-bottom: 12px; }
  .fomc-next .days { font-size: 14px; color: #999; font-weight: 400; }
  .fomc-timeline { display: flex; flex-wrap: wrap; gap: 8px; }
  .fomc-dot { font-size: 12px; padding: 4px 10px; border-radius: 6px; background: #1a1a1a; color: #666; }
  .fomc-dot.past { opacity: 0.4; }
  .fomc-dot.next { background: #422006; color: #f59e0b; font-weight: 600; }
  .fomc-dot.future { color: #999; }

  /* Twitter */
  .tweets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .tweet-col { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 12px; min-height: 400px; overflow: hidden; }
  .tweet-col .handle { font-size: 13px; color: #888; margin-bottom: 8px; }

  .loading { text-align: center; color: #444; padding: 40px 0; font-size: 14px; }
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .earnings-grid { grid-template-columns: 1fr; }
    .tweets-grid { grid-template-columns: 1fr; }
    .ipo-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <header>
    <h1>Day1 Briefing</h1>
    <span class="time" id="updated"></span>
  </header>

  <section>
    <h2>Stocks & ETF</h2>
    <div class="grid" id="stocks"><div class="loading">Loading...</div></div>
  </section>

  <section>
    <h2>Crypto</h2>
    <div class="grid" id="crypto"><div class="loading">Loading...</div></div>
  </section>

  <section>
    <h2>BTC Cycle Score</h2>
    <div class="btc-box" id="btc-score"><div class="loading">Loading...</div></div>
  </section>

  <section>
    <h2>Earnings Calendar</h2>
    <div class="earnings-grid" id="earnings"><div class="loading">Loading...</div></div>
  </section>

  <section>
    <h2>FOMC Calendar</h2>
    <div class="fomc-box" id="fomc"><div class="loading">Loading...</div></div>
  </section>

  <section>
    <h2>Market News — Mando Minutes</h2>
    <div class="mando-box" id="mando"><div class="loading">Loading...</div></div>
  </section>

  <section>
    <h2>IPO Watch</h2>
    <div class="ipo-grid" id="ipo"><div class="loading">Loading...</div></div>
  </section>

  <section>
    <h2>Twitter Feed</h2>
    <div class="tweets-grid" id="tweets"></div>
  </section>

<script>
const TWITTER_HANDLES = ['cburniske', 'QwQiao', 'saylor', 'viktorfischer'];

function renderPriceCard(item) {
  const cls = item.error ? 'error' : (item.change_pct > 0 ? 'up' : item.change_pct < 0 ? 'down' : 'flat');
  const sign = item.change_pct > 0 ? '+' : '';
  const arrow = item.change_pct > 0 ? '▲' : item.change_pct < 0 ? '▼' : '';
  const p = item.price >= 1000 ? item.price.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})
    : item.price < 1 ? item.price.toPrecision(4) : item.price.toFixed(2);
  return `<div class="card ${item.error ? 'error' : ''}">
    <div class="symbol">${item.symbol}</div>
    <div class="price ${cls}">$${p}</div>
    <div class="change ${cls}">${arrow} ${sign}${item.change_pct}%</div>
  </div>`;
}

function renderBTCScore(bs) {
  if (!bs) return '<div class="loading">No data</div>';
  const scoreColor = bs.score <= 35 ? 'score-low' : bs.score <= 65 ? 'score-mid' : 'score-high';
  const indicators = bs.indicators.map(i => {
    const fillColor = i.score <= 35 ? '#22c55e' : i.score <= 65 ? '#f59e0b' : '#ef4444';
    const pct = Math.min(i.score, 100);
    return `<div class="btc-ind">
      <span class="ind-name">${i.name}</span>
      <span class="ind-bar"><span class="ind-fill" style="width:${pct}%;background:${fillColor}"></span></span>
      <span class="ind-score">${i.score}</span>
    </div>`;
  }).join('');
  return `<div class="btc-header">
      <span class="btc-score-big ${scoreColor}">${bs.score}</span>
      <div class="btc-meta">
        <div class="level">${bs.level}</div>
        <div>BTC $${bs.btc_price?.toLocaleString()} · Fear ${bs.fear_greed}</div>
        <div>Daily ${bs.daily_score}/32 · Weekly ${bs.weekly_score}/68</div>
      </div>
    </div>
    <div class="btc-suggestion">${bs.suggestion}</div>
    <div class="btc-indicators">${indicators}</div>`;
}

function renderEarnings(earnings) {
  return Object.entries(earnings).map(([symbol, data]) => {
    const saUrl = `https://seekingalpha.com/symbol/${symbol}/earnings`;
    const nextHtml = data.next
      ? `<div class="next-date">Next: ${data.next.date} (Q${data.next.quarter} ${data.next.year})${data.next.is_estimate ? ' <span class="est">est.</span>' : ''}</div>`
      : `<div class="next-date" style="color:#444">Next: TBD</div>`;
    const commentHtml = data.comment ? `<div class="comment">${data.comment}</div>` : '';
    const histHtml = data.history.length
      ? data.history.slice(0, 4).map(h => {
          const cls = (h.surprise_pct ?? 0) > 0 ? 'beat' : (h.surprise_pct ?? 0) < 0 ? 'miss' : '';
          const surp = h.surprise_pct != null ? `${h.surprise_pct > 0 ? '+' : ''}${h.surprise_pct.toFixed(1)}%` : '-';
          const qUrl = `https://seekingalpha.com/symbol/${symbol}/earnings/transcripts`;
          return `<div class="q-row">
            <a href="${qUrl}" target="_blank">Q${h.quarter} ${h.year}</a>
            <span>EPS: ${h.actual ?? '-'} / ${h.estimate ?? '-'}</span>
            <span class="${cls}">${surp}</span></div>`;
        }).join('')
      : '<div style="color:#444;font-size:12px">No history</div>';
    return `<div class="earn-card">
      <div class="sym"><a href="${saUrl}" target="_blank">${symbol} ↗</a></div>
      ${commentHtml}${nextHtml}
      <div class="quarters">${histHtml}</div>
    </div>`;
  }).join('');
}

function renderFOMC(fomc) {
  const today = new Date().toISOString().slice(0, 10);
  const nextHtml = fomc.next
    ? `<div class="fomc-next">${fomc.next.date} <span class="days">(${fomc.next.days_until} days)</span></div>`
    : '';
  const dots = fomc.schedule.map(d => {
    const cls = d < today ? 'past' : d === fomc.next?.date ? 'next' : 'future';
    const label = d.slice(5);
    return `<span class="fomc-dot ${cls}">${label}</span>`;
  }).join('');
  return `${nextHtml}<div class="fomc-timeline">${dots}</div>`;
}

function renderMando(mando) {
  if (!mando) return '<div class="loading">No data</div>';
  const date = mando.date ? new Date(mando.date * 1000).toLocaleDateString('zh-CN', {month:'short', day:'numeric'}) : '';
  const sectionsHtml = mando.sections.map(s => {
    const hdr = s.header ? `<div class="sec-header">${s.header}</div>` : '';
    const items = s.items.slice(0, 20).map(i => `<div class="sec-item">${i}</div>`).join('');
    return `<div class="mando-section">${hdr}${items}</div>`;
  }).join('');
  return `<div class="mando-header">
    <div class="title"><a href="${mando.url}" target="_blank">${mando.title} ↗</a></div>
    <div class="date">${date}</div>
  </div>
  <div class="mando-sections">${sectionsHtml}</div>`;
}

function renderIPO(ipo) {
  return ipo.map(c => {
    const newsHtml = c.news.length
      ? c.news.map(n => {
          const d = new Date(n.datetime * 1000).toLocaleDateString('zh-CN', {month:'short', day:'numeric'});
          return `<div class="ipo-news-item"><a href="${n.url}" target="_blank">${n.headline}</a> <span class="date">${d}</span></div>`;
        }).join('')
      : '<div class="no-news">No recent news</div>';
    return `<div class="ipo-card"><div class="name">${c.company}</div>${newsHtml}</div>`;
  }).join('');
}

function renderTweets() {
  document.getElementById('tweets').innerHTML = TWITTER_HANDLES.map(h => `
    <div class="tweet-col">
      <div class="handle">@${h}</div>
      <a class="twitter-timeline" data-theme="dark" data-chrome="noheader nofooter noborders transparent"
         data-height="500" href="https://twitter.com/${h}">@${h}</a>
    </div>`).join('');
  const s = document.createElement('script');
  s.src = 'https://platform.twitter.com/widgets.js';
  s.async = true;
  document.body.appendChild(s);
}

async function load() {
  let d;
  try {
    const res = await fetch('data/market.json?t=' + Date.now());
    d = await res.json();
  } catch (e) {
    document.getElementById('stocks').innerHTML = '<div class="loading">Failed to load data</div>';
    return;
  }
  const sections = [
    ['stocks', () => d.stocks?.map(renderPriceCard).join('')],
    ['crypto', () => d.crypto?.map(renderPriceCard).join('')],
    ['btc-score', () => d.btc_score ? renderBTCScore(d.btc_score) : null],
    ['earnings', () => d.earnings ? renderEarnings(d.earnings) : null],
    ['fomc', () => d.fomc ? renderFOMC(d.fomc) : null],
    ['mando', () => d.mando ? renderMando(d.mando) : null],
    ['ipo', () => d.ipo_watch ? renderIPO(d.ipo_watch) : null],
  ];
  for (const [id, fn] of sections) {
    try {
      const html = fn();
      if (html != null) document.getElementById(id).innerHTML = html;
    } catch (e) {
      console.error(`Render ${id}:`, e);
      document.getElementById(id).innerHTML = `<div class="loading">Error: ${e.message}</div>`;
    }
  }
  if (d.updated_at) {
    const t = new Date(d.updated_at);
    document.getElementById('updated').textContent = t.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
  }
}

load();
renderTweets();
</script>
</body>
</html>
